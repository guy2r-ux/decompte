  <title>Les 2R vont en Suisse 🇨🇭</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {

      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }
    canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 1.2rem 1.2rem 1.4rem;
      text-align: center;
      max-width: 340px;
      width: 80%;
      position: relative;
      z-index: 10;
    }
    .icon { font-size: 28px; margin-bottom: 0.5rem; }
    h1 { font-size: 16px; font-weight: 600; color: #ffffff; margin-bottom: 0.25rem; }
    .date-label { font-size: 11px; color: rgba(255,255,255,0.45); margin-bottom: 1.2rem; }
    .units { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 1.2rem; }
    .unit { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 0.6rem 0.7rem; min-width: 60px; }
    .unit-number { font-size: 26px; font-weight: 700; color: #f7c948; line-height: 1; }
    .unit-label { font-size: 9px; color: rgba(255,255,255,0.45); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
    .progress-bg { background: rgba(255,255,255,0.1); border-radius: 99px; height: 4px; overflow: hidden; }
    .progress-fill { height: 4px; border-radius: 99px; background: linear-gradient(90deg, #f7c948, #f0a500); transition: width 1s linear; }
    .done { font-size: 18px; font-weight: 600; color: #fff; }
  </style>

    const sprite = { x: 200, y: 200, size: 110, vx: 2.8, vy: 2.2, angle: 0, spin: 0.015 };

    function animate() {
      ctx.clearRect(0, 0, W, H);
      sprite.x += sprite.vx;
      sprite.y += sprite.vy;
      sprite.angle += sprite.spin;
      const margin = sprite.size * 0.5;
      if (sprite.x < margin || sprite.x > W - margin) { sprite.vx *= -1; sprite.spin *= -1; sprite.x = Math.max(margin, Math.min(W - margin, sprite.x)); }
      if (sprite.y < margin || sprite.y > H - margin) { sprite.vy *= -1; sprite.y = Math.max(margin, Math.min(H - margin, sprite.y)); }
      ctx.save();
      ctx.translate(sprite.x, sprite.y);
      ctx.rotate(sprite.angle);
      ctx.drawImage(img, -sprite.size / 2, -sprite.size / 2, sprite.size, sprite.size);
      ctx.restore();
      requestAnimationFrame(animate);
    }
    img.onload = animate;

    const target = new Date(2026, 6, 25, 5, 0, 0);
    function pad(n) { return String(n).padStart(2, "0"); }
    function update() {
      const now = new Date();
      const diff = target - now;
      if (diff <= 0) {
        document.getElementById("units").innerHTML = "<div class="done">🎉 Bon voyage en Suisse !</div>";
        document.getElementById("progress-fill").style.width = "100%";
        return;
      }
      const totalSec = Math.floor(diff / 1000);
      document.getElementById("days").textContent = Math.floor(totalSec / 86400);
      document.getElementById("hours").textContent = pad(Math.floor((totalSec % 86400) / 3600));
      document.getElementById("minutes").textContent = pad(Math.floor((totalSec % 3600) / 60));
      document.getElementById("seconds").textContent = pad(totalSec % 60);
      const refStart = new Date(2026, 0, 1);
      const pct = Math.min(100, ((now - refStart) / (target - refStart)) * 100);
      document.getElementById("progress-fill").style.width = pct.toFixed(1) + "%";
      setTimeout(update, 1000);
    }
    update();
  </script>
