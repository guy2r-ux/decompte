<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Les 2R vont en Suisse 🇨🇭</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon { font-size: 40px; margin-bottom: 1rem; }
    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 0.4rem;
    }
    .date-label {
      font-size: 13px;
      color: #888;
      margin-bottom: 2rem;
    }
    .units {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .unit {
      background: #f0faf5;
      border-radius: 14px;
      padding: 1rem 1.1rem;
      min-width: 74px;
    }
    .unit-number {
      font-size: 34px;
      font-weight: 700;
      color: #0f6e56;
      line-height: 1;
    }
    .unit-label {
      font-size: 10px;
      color: #666;
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .progress-wrap { margin-top: 0.5rem; }
    .progress-bg {
      background: #e8e8e8;
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
    }
    .progress-fill {
      height: 6px;
      border-radius: 99px;
      background: #1D9E75;
      transition: width 1s linear;
    }
    .done { font-size: 24px; font-weight: 600; color: #1a1a1a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🏔️</div>
    <h1>Les 2R vont en Suisse 🇨🇭</h1>
    <div class="date-label">Vendredi 25 juillet 2026 à 05h00</div>
    <div class="units" id="units">
      <div class="unit"><div class="unit-number" id="days">--</div><div class="unit-label">Jours</div></div>
      <div class="unit"><div class="unit-number" id="hours">--</div><div class="unit-label">Heures</div></div>
      <div class="unit"><div class="unit-number" id="minutes">--</div><div class="unit-label">Minutes</div></div>
      <div class="unit"><div class="unit-number" id="seconds">--</div><div class="unit-label">Secondes</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bg"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
  </div>
  <script>
    const target = new Date(2026, 6, 25, 5, 0, 0);
    function pad(n) { return String(n).padStart(2, '0'); }
    function update() {
      const now = new Date();
      const diff = target - now;
      if (diff <= 0) {
        document.getElementById('units').innerHTML = '<div class="done">🎉 Bon voyage en Suisse !</div>';
        document.getElementById('progress-fill').style.width = '100%';
        return;
      }
      const totalSec = Math.floor(diff / 1000);
      document.getElementById('days').textContent = Math.floor(totalSec / 86400);
      document.getElementById('hours').textContent = pad(Math.floor((totalSec % 86400) / 3600));
      document.getElementById('minutes').textContent = pad(Math.floor((totalSec % 3600) / 60));
      document.getElementById('seconds').textContent = pad(totalSec % 60);
      const refStart = new Date(2026, 0, 1);
      const pct = Math.min(100, ((now - refStart) / (target - refStart)) * 100);
      document.getElementById('progress-fill').style.width = pct.toFixed(1) + '%';
      setTimeout(update, 1000);
    }
    update();
  </script>
</body>
</html>
